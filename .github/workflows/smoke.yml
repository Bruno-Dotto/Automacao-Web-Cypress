name: Cypress Smoke Tests

on:
  push:
    branches:
      - '**'

  pull_request:
    branches:
      - master

  schedule:
    # Executa todos os dias às 12:00 (Horário de Brasília = 15:00 UTC)
    - cron: '0 15 * * *'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🧪 Executar Smoke Tests
        run: npm run smoke

      - name: 📊 Gerar relatório Mochawesome
        if: always()
        run: npm run report

      - name: 📁 Upload do relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: cypress/reports

      - name: 📄 Configurar GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: 📤 Upload para GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./cypress/reports

      - name: 🚀 Publicar GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4